# Network simulator for the autonet (no-DHCP) test segment.
#
# Run this on ONE spare edge-compute box wired into the BR2 test VLAN (DHCP
# disabled on that VLAN). It uses a macvlan network so each container is a real
# L2 neighbor on the segment with its own MAC + static IP — exactly what the
# gateway Pi's autonet sniffer and the dashboard's arp-scan expect to see.
#
# Edit .env (copy from .env.example) first. If you change SUBNET, also update the
# ipv4_address values below to match.

networks:
  testlan:
    driver: macvlan
    driver_opts:
      parent: ${PARENT_IFACE}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}

x-host-common: &host-common
  build: ./host
  image: tsg-sim-host:local
  cap_add: [NET_RAW, NET_ADMIN]
  restart: unless-stopped

services:
  host-a:
    <<: *host-common
    environment:
      SELF_NAME: host-a
      GATEWAY: ${GATEWAY}
      BROADCAST: ${BROADCAST}
      PEERS: "192.168.77.62 192.168.77.63"
    networks:
      testlan:
        ipv4_address: 192.168.77.61

  host-b:
    <<: *host-common
    environment:
      SELF_NAME: host-b
      GATEWAY: ${GATEWAY}
      BROADCAST: ${BROADCAST}
      PEERS: "192.168.77.61 192.168.77.63"
    networks:
      testlan:
        ipv4_address: 192.168.77.62

  host-c:
    <<: *host-common
    environment:
      SELF_NAME: host-c
      GATEWAY: ${GATEWAY}
      BROADCAST: ${BROADCAST}
      PEERS: "192.168.77.61 192.168.77.62"
    networks:
      testlan:
        ipv4_address: 192.168.77.63

  # Optional LLDP advertiser. Enable with:  docker compose --profile lldp up -d
  # Uses host networking so it advertises on the physical NIC.
  lldp:
    build: ./lldp
    image: tsg-sim-lldp:local
    profiles: ["lldp"]
    network_mode: host
    cap_add: [NET_ADMIN, NET_RAW, SYS_ADMIN]
    restart: unless-stopped
